// In-memory store (loaded from Firebase on login, kept in sync)
var MEM = {};
function lsk(k){ return 'cg7_' + k; }
function gls(k){ return MEM[k] !== undefined ? MEM[k] : (function(){ try{var d=localStorage.getItem(lsk(k));return d?JSON.parse(d):{};}catch(e){return{};} })(); }
function sls(k,v){ MEM[k]=v; try{localStorage.setItem(lsk(k),JSON.stringify(v));}catch(e){} fbWrite('/'+k, v); }
function gla(k){ return MEM[k] !== undefined ? MEM[k] : (function(){ try{var d=localStorage.getItem(lsk(k));return d?JSON.parse(d):[];}catch(e){return[];} })(); }
function sla(k,v){ MEM[k]=v; try{localStorage.setItem(lsk(k),JSON.stringify(v));}catch(e){} fbWrite('/'+k, v); }
function cloneDeep(o){ return JSON.parse(JSON.stringify(o)); }

// Log helpers — localStorage is primary, Firebase is async backup
function getLog(uid){
  try {
    var raw = localStorage.getItem('cg7_log_'+uid);
    return raw ? JSON.parse(raw) : {};
  } catch(e){ return {}; }
}
function saveLog(uid, log){
  try { localStorage.setItem('cg7_log_'+uid, JSON.stringify(log)); } catch(e){}
  // also sync to Firebase (fire-and-forget, no overwrite on reload)
  fbWrite('/log_'+uid, log);
}

function applyEditData(){
  // Load editData directly from localStorage (no Firebase, no MEM cache)
  try {
    var raw = localStorage.getItem(lsk('editData'));
    if(!raw) return;
    var saved = JSON.parse(raw);
    if(!saved || typeof saved !== 'object') return;
    Object.keys(saved).forEach(function(uid){
      if(!appData[uid] || !saved[uid]) return;
      if(saved[uid].secs   !== undefined) appData[uid].secs   = saved[uid].secs;
      if(saved[uid].resp   !== undefined) appData[uid].resp   = saved[uid].resp;
      if(saved[uid].ifaces !== undefined) appData[uid].ifaces = saved[uid].ifaces;
      if(saved[uid].cad    !== undefined) appData[uid].cad    = saved[uid].cad;
    });
  } catch(e) {}
}

function initData(callback){
  appData = cloneDeep(DEFS);
  applyEditData();  // always apply saved edits first, directly from localStorage
  var savedTc = localStorage.getItem(lsk('tc'));
  if(savedTc) tc = parseFloat(savedTc) || 1350;
  var el = document.getElementById('tcinp');
  if(el) el.value = tc;
  if(!FB_ON){ if(callback) callback(); return; }
  showLoading(true);
  var uids = Object.keys(USERS).filter(function(u){ return !USERS[u].isDir; });
  var ps = [];
  // NOTE: editData is NOT read from Firebase — localStorage is the source of truth
  //       Firebase is only used for log entries (user-entered KPI data)
  uids.forEach(function(uid){
    ps.push(fbRead('/log_'+uid).then(function(d){
      // Only apply Firebase data if localStorage has nothing for this user
      if(d){
        var local = localStorage.getItem('cg7_log_'+uid);
        if(!local){ try{localStorage.setItem('cg7_log_'+uid,JSON.stringify(d));}catch(e){} }
      }
    }));
  });
  ps.push(fbRead('/tc').then(function(d){
    if(d){ tc=parseFloat(d)||1350; var ti=document.getElementById('tcinp'); if(ti) ti.value=tc; }
  }));
  Promise.all(ps).then(function(){ showLoading(false); if(callback) callback(); }).catch(function(){ showLoading(false); if(callback) callback(); });
}

function showLoading(on){
  var el=document.getElementById('ldbar');
  if(!el){
    el=document.createElement('div'); el.id='ldbar';
    el.style.cssText='position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#16A34A,#38B2AC);z-index:9999;transition:opacity .3s';
    document.body.appendChild(el);

  el.style.opacity=on?'1':'0';
}

function pk(n){
  if(pin.length >= 4) return;
  pin += String(n);
  upDots();
  if(pin.length === 4){
    var uid = PINS[pin];
    if(uid){
      curUser = USERS[uid];
      editMode = false;
      dirView = null;
      pin = '';
      initData(function(){
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').className = 'on';
        renderApp();
      });
    } else {
      var dots = document.querySelectorAll('.pdot');
      for(var i=0;i<dots.length;i++) dots[i].classList.add('err');
      var m = document.getElementById('lmsg');
      m.textContent = 'PIN incorrecto - intenta de nuevo';
      m.className = 'lmsg err';
      setTimeout(function(){
        pin = ''; upDots();
        m.textContent = 'Ingresa tu PIN de 4 digitos';
        m.className = 'lmsg';
      }, 900);
    }
  }
}
function pkd(){
  if(pin.length > 0){ pin = pin.slice(0,-1); upDots(); }
}
function upDots(){
  for(var i=0;i<4;i++){
    var d = document.getElementById('p'+i);
    if(i < pin.length) d.classList.add('on'); else d.classList.remove('on');
    d.classList.remove('err');
  }
}
function logout(){
  pin=''; curUser=null; dirView=null; editMode=false;

  document.getElementById('login').style.display='';

  document.getElementById('lmsg').textContent='Ingresa tu PIN de 4 digitos';
  document.getElementById('lmsg').className='lmsg';
}

function getSem(m,a,t){
  if(m===null||a===''||a===null||a===undefined) return 'none';
  var av=parseFloat(a), mv=parseFloat(m);
  if(isNaN(av)||isNaN(mv)) return 'none';
  if(t==='MAX') return av>=mv?'green':av>=mv*.9?'yellow':'red';
  if(t==='MIN') return av<=mv?'green':av<=mv*1.1?'yellow':'red';
  var d=Math.abs(av-mv)/mv; return d<=.1?'green':d<=.2?'yellow':'red';
}
function getProg(m,a,t){
  if(m===null||a===''||a===null) return 0;
  var av=parseFloat(a), mv=parseFloat(m);
  if(isNaN(av)||isNaN(mv)||mv===0) return 0;
  if(t==='MAX') return Math.min(100,Math.round(av/mv*100));
  if(t==='MIN') return Math.min(100,Math.round((1-Math.max(0,av-mv)/mv)*100));
  return Math.min(100,Math.round((1-Math.abs(av-mv)/mv)*100));
}
function fmtM(v,fmt){
  if(v===null) return 'Baseline Q2';
  if(fmt==='usd') return 'USD '+Number(v).toLocaleString('es-AR');
  if(fmt==='ars') return '$'+Number(v).toLocaleString('es-AR');
  if(fmt==='pct'||fmt==='pct1') return v+'%';
  if(fmt==='dec') return parseFloat(v).toFixed(1);
  return String(v);
}
function fmtA(v,fmt){
  if(v===''||v===null||v===undefined) return '';
  if(fmt==='usd') return 'USD '+Number(v).toLocaleString('es-AR');
  if(fmt==='ars') return '$'+Number(v).toLocaleString('es-AR');
  if(fmt==='pct'||fmt==='pct1') return parseFloat(v).toFixed(1)+'%';
  if(fmt==='dec') return parseFloat(v).toFixed(1);
  return String(v);
}
function getDv(m,a){
  if(m===null||a===''||a===null) return '';
  var av=parseFloat(a), mv=parseFloat(m);
  if(isNaN(av)||isNaN(mv)||mv===0) return '';
  var p=(av-mv)/mv*100;
  return (p>=0?'+':'')+Math.abs(p).toFixed(1)+'%';
}
function getDvC(m,a,t){
  if(m===null||a===''||a===null) return '';
  var av=parseFloat(a), mv=parseFloat(m);
  if(isNaN(av)||isNaN(mv)||mv===0) return '';
  var d=av-mv;
  if(t==='MAX') return d>=0?'pos':'neg';
  if(t==='MIN') return d<=0?'pos':'neg';
  return Math.abs(d/mv)<=.1?'pos':'neu';
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDt(iso){
  try{
    var d=new Date(iso);
    return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})
      +' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){ return iso; }
}
function esc(s){
  if(!s && s!==0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  stopAutoRefresh();

    var uids=Object.keys(USERS).filter(function(u){return !USERS[u].isDir;});
    var ps=uids.map(function(uid){

        if(d){ MEM['log_'+uid]=d; try{localStorage.setItem(lsk('log_'+uid),JSON.stringify(d));}catch(e){} }

    ed[uid] = {
      secs:   appData[uid].secs,
      resp:   appData[uid].resp,
      ifaces: appData[uid].ifaces,
      cad:    appData[uid].cad
    };
  });
  // Save directly to localStorage (bypassing MEM to avoid stale cache issues)

  fbWrite('/editData', ed);

function calcStats(uid){
  var secs = appData[uid] ? appData[uid].secs : [];
  var log = getLog(uid);
  var g=0,y=0,r=0,n=0;
  secs.forEach(function(sec){
    sec.kpis.forEach(function(k){
      var entries = log[k.id]||[];
      var a = entries.length ? entries[0].val : '';
      var sv = getSem(k.m,a,k.t);
      if(sv==='green')g++; else if(sv==='yellow')y++; else if(sv==='red')r++; else n++;
    });
  });
  return {g:g,y:y,r:r,n:n};
}

function statsHtml(g,y,r,n){
  var tot=g+y+r+n, pct=tot>0?Math.round((g+y+r)/tot*100):0;
  return '<div class="sbar">'+
    '<div class="sc"><div class="dot dg"></div><div><div class="sn" style="color:#16A34A">'+g+'</div><div class="sl">Verde</div></div></div>'+
    '<div class="sc"><div class="dot dy"></div><div><div class="sn" style="color:#D97706">'+y+'</div><div class="sl">Atencion</div></div></div>'+
    '<div class="sc"><div class="dot dr"></div><div><div class="sn" style="color:#EF4444">'+r+'</div><div class="sl">Revisar L10</div></div></div>'+
    '<div class="sc"><div class="dot dn"></div><div><div class="sn" style="color:#94A3B8">'+n+'</div><div class="sl">Sin dato</div></div></div>'+
    '<div class="pgw"><div class="pgl">Completitud</div>'+
    '<div class="pgt"><div class="pgf" style="width:'+pct+'%"></div></div>'+
    '<div class="pgn">'+pct+'%</div></div></div>';
}

function renderUserDash(uid){
  var d = appData[uid];
  if(!d){ document.getElementById('main').innerHTML='<p>Sin datos</p>'; return; }
  var secs = d.secs;
  var log = getLog(uid);
  var isOwner = (!curUser.isDir && uid===curUser.id);
  var st = calcStats(uid);
  var html = '';
  if(curUser.isDir && dirView){
    html += '<button class="btn-back" id="backbtn">&#8592; Volver</button>';
  }
  html += statsHtml(st.g,st.y,st.r,st.n);

  // Left panel (resp + ifaces + cad) - shared across all secs of user
  var leftHtml = buildLeft(d,uid);

  secs.forEach(function(sec,si){
    html += buildSec(sec,si,uid,log,isOwner,leftHtml);
    leftHtml = ''; // only show left panel on first section
  });
  if(editMode && curUser.isDir){
    html += '<button class="addbtn" style="border-radius:10px;padding:10px;font-size:12px" data-uid="'+uid+'" data-action="addsec">+ Agregar seccion</button>';
  }
  html += '<div style="height:2rem"></div>';
  document.getElementById('main').innerHTML = html;

  // Wire back button
  var bb = document.getElementById('backbtn');
  if(bb) bb.addEventListener('click', function(){ dirView=null; renderApp(); });

  // Wire dynamic events
  wireEvents(uid);
}

function buildLeft(d,uid){
  var inEdit = editMode && curUser.isDir;
  var html = '';

  // Responsibilities
  html += '<div class="mlbl">Responsabilidades</div><div class="rlist">';
  if(inEdit){
    d.resp.forEach(function(rv,ri){
      html += '<div class="erow">'+
        '<div class="rbul" style="flex-shrink:0"></div>'+
        '<input class="einp" type="text" value="'+esc(rv)+'" data-uid="'+uid+'" data-action="setr" data-ri="'+ri+'" style="flex:1;font-size:11px">'+
        '<button class="delbtn" data-uid="'+uid+'" data-action="delr" data-ri="'+ri+'">x</button></div>';
    });
    html += '<button class="addbtn" data-uid="'+uid+'" data-action="addr">+ Responsabilidad</button>';
  } else {
    d.resp.forEach(function(rv){
      html += '<div class="ritem"><div class="rbul"></div><div>'+esc(rv)+'</div></div>';
    });
  }
  html += '</div>';

  // Interfaces
  html += '<div class="mlbl" style="margin-top:12px">Interfaces</div><div class="iflist">';
  d.ifaces.forEach(function(ifc,ii){
    html += '<div class="ifitem"><div class="ifbadge" style="background:'+ifc.c+'">'+esc(ifc.a)+'</div>'+
      (inEdit?
        '<input class="einp" type="text" value="'+esc(ifc.d)+'" data-uid="'+uid+'" data-action="setifd" data-ii="'+ii+'" style="font-size:10px;margin-top:3px">':
        '<div class="ifdesc">'+esc(ifc.d)+'</div>')+
      '</div>';
  });
  html += '</div>';

  // Cadence
  html += '<div class="mlbl" style="margin-top:12px">Cadencia de gestion</div><div class="cadgrid">';
  [['d','DIARIO','cad-d'],['s','SEMANAL','cad-s'],['m','MENSUAL','cad-m']].forEach(function(ci){
    var txt = d.cad[ci[0]]||'';
    html += '<div class="caditem"><div class="cadlbl '+ci[2]+'">'+ci[1]+'</div>';
    if(inEdit){
      html += '<textarea class="eta cadtxt" style="min-height:40px" data-uid="'+uid+'" data-action="setcad" data-ck="'+ci[0]+'">'+esc(txt)+'</textarea>';
    } else {
      html += '<div class="cadtxt '+(txt?'':'cadmt')+'">'+esc(txt||'--')+'</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function buildSec(sec,si,uid,log,isOwner,leftHtml){
  var inEdit = editMode && curUser.isDir;
  var g=0,y=0,r=0;
  sec.kpis.forEach(function(k){
    var entries=log[k.id]||[];
    var a=entries.length?entries[0].val:'';
    var sv=getSem(k.m,a,k.t);
    if(sv==='green')g++; else if(sv==='yellow')y++; else if(sv==='red')r++;
  });
  var sgH = g>0?'<div class="ssem"><div class="dot dg"></div>'+g+'</div>':'';
  var syH = y>0?'<div class="ssem"><div class="dot dy"></div>'+y+'</div>':'';
  var srH = r>0?'<div class="ssem"><div class="dot dr"></div>'+r+'</div>':'';
  var alertH = sec.alert?'<div class="sec-alert"><span>!</span><div>'+esc(sec.alert)+'</div></div>':'';

  var titleH = inEdit?
    '<input class="einp" type="text" value="'+esc(sec.s)+'" data-uid="'+uid+'" data-si="'+si+'" data-action="setsect" style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px">':
    '<div class="sec-title">'+esc(sec.s)+'</div>';

  var kpiRows = '';
  sec.kpis.forEach(function(k,ki){
    kpiRows += buildKpiRow(k,ki,si,uid,log,isOwner,inEdit,sec.c);
  });
  if(inEdit){
    kpiRows += '<button class="addbtn" data-uid="'+uid+'" data-si="'+si+'" data-action="addkpi">+ KPI</button>';
  }

  return '<div class="seccard" style="border-left:4px solid '+sec.c+'">'+
    '<div class="sec-hd">'+
    '<div style="flex:1;min-width:0">'+titleH+
    '<div class="sec-resp">'+esc(sec.responsable||'')+(sec.sub?'<span class="sec-sub">'+esc(sec.sub)+'</span>':'')+'</div>'+
    (inEdit?'<textarea class="eta sec-desc" style="min-height:44px;margin-top:5px" data-uid="'+uid+'" data-si="'+si+'" data-action="setsecdesc">'+esc(sec.desc||'')+'</textarea>':
             '<div class="sec-desc">'+esc(sec.desc||'')+'</div>')+
    alertH+'</div>'+
    '<div class="sec-sems">'+sgH+syH+srH+'</div>'+
    '</div>'+
    '<div class="sec-bd">'+
    (leftHtml?'<div class="sec-l">'+leftHtml+'</div>':'<div class="sec-l" style="display:none"></div>')+
    '<div class="sec-r">'+kpiRows+'</div>'+
    '</div></div>';
}

function buildKpiRow(k,ki,si,uid,log,isOwner,inEdit,secColor){
  var entries = log[k.id]||[];
  var a = entries.length ? entries[0].val : '';
  var s=getSem(k.m,a,k.t), pr=getProg(k.m,a,k.t);
  var dvStr=getDv(k.m,a), dvCls=getDvC(k.m,a,k.t);
  var fcCls={Diario:'kb-d',Semanal:'kb-s',Mensual:'kb-m',Quincenal:'kb-q'}[k.f]||'kb-m';
  var tipoCls={MAX:'kb-max',MIN:'kb-min',MAN:'kb-man'}[k.t]||'kb-man';
  var tipoLbl={MAX:'Max',MIN:'Min',MAN:'Mantener'}[k.t]||'';
  var stCls={green:'st-g',yellow:'st-y',red:'st-r',none:'st-n'}[s];
  var stTxt={green:'En objetivo',yellow:'Atencion',red:'Revisar L10',none:'Sin datos'}[s];
  var numStr = k.n<10?'0'+k.n:String(k.n);
  var scC={green:'#16A34A',yellow:'#D97706',red:'#EF4444',none:'#CBD5E1'}[s];

  var nameH = inEdit?
    '<input class="einp" type="text" value="'+esc(k.l)+'" data-uid="'+uid+'" data-si="'+si+'" data-ki="'+ki+'" data-action="setkname" style="font-size:12px;font-weight:700;margin-bottom:2px">':
    '<div class="kname">'+esc(k.l)+'</div>';
  var descH = inEdit?
    '<textarea class="eta kdesc" style="min-height:34px;margin-bottom:4px" data-uid="'+uid+'" data-si="'+si+'" data-ki="'+ki+'" data-action="setkdesc">'+esc(k.d)+'</textarea>':
    '<div class="kdesc">'+esc(k.d)+'</div>';

  var freqH = inEdit?
    '<select class="esel" data-uid="'+uid+'" data-si="'+si+'" data-ki="'+ki+'" data-action="setkfreq">'+
    ['Diario','Semanal','Mensual','Quincenal'].map(function(v){ return '<option value="'+v+'"'+(k.f===v?' selected':'')+'>'+v+'</option>'; }).join('')+
    '</select>':
    '<span class="kb kbf '+fcCls+'">'+esc(k.f)+'</span>';
  var tipoH = inEdit?
    '<select class="esel" data-uid="'+uid+'" data-si="'+si+'" data-ki="'+ki+'" data-action="setktype">'+
    ['MAX','MIN','MAN'].map(function(v){ return '<option value="'+v+'"'+(k.t===v?' selected':'')+'>'+v+'</option>'; }).join('')+
    '</select>':
    '<span class="kb kbf '+tipoCls+'">'+tipoLbl+'</span>';

  var metaH = inEdit?
    '<div style="display:flex;align-items:center;gap:5px;margin-top:3px">'+
    '<span class="kmeta">Meta:</span>'+
    '<input class="enum" type="number" step="any" value="'+(k.m!==null?k.m:'')+'" placeholder="null" data-uid="'+uid+'" data-si="'+si+'" data-ki="'+ki+'" data-action="setkmeta">'+
    '<input class="einp" type="text" value="'+esc(k.u)+'" data-uid="'+uid+'" data-si="'+si+'" data-ki="'+ki+'" data-action="setkunit" style="width:60px;font-size:10px">'+
    '</div>':
    '<div class="kmeta">Meta: <strong>'+fmtM(k.m,k.fmt)+'</strong> '+esc(k.u)+'</div>';

  // Right column
  var rightH = '';
  if(inEdit){
    rightH = '<button class="delbtn" style="align-self:flex-start" data-uid="'+uid+'" data-si="'+si+'" data-ki="'+ki+'" data-action="delkpi">x Eliminar</button>';
  } else if(a!==''&&a!==undefined){
    rightH = '<div class="kval">'+fmtA(a,k.fmt)+' <span style="font-size:9px;color:#94A3B8">'+esc(k.u)+'</span></div>'+
      (entries[0].ts?'<div class="kdate">'+fmtDt(entries[0].ts)+'</div>':'');
  } else {
    rightH = '<div class="kno">sin registros</div>';
  }

  if(!inEdit){
    rightH += '<button class="kreg" data-action="kreg" data-uid="'+uid+'" data-kid="'+k.id+'" data-fmt="'+k.fmt+'" data-type="'+k.t+'">+ Registrar</button>';
    rightH += '<div id="kform_'+uid+'_'+k.id+'" style="display:none"></div>';
  }

  rightH += '<div class="kpb"><div class="kp kp-'+s[0]+'" style="width:'+pr+'%"></div></div>'+
    '<div class="ksem"><div class="ksd" style="background:'+scC+'"></div>'+
    '<div class="kst '+stCls+'">'+stTxt+'</div>'+
    (dvStr?'<span class="kdv '+dvCls+'">'+dvStr+'</span>':'')+
    '</div>';

  // History — shown always; director can delete entries
  if(entries.length > 0){
    var openByDefault = inEdit; // expand automatically in edit mode
    rightH += '<button class="klogt" data-histid="khist_'+uid+'_'+k.id+'">'+(openByDefault?'&#9660;':'&#9654;')+' '+entries.length+' registro'+(entries.length>1?'s':'')+'</button>';
    rightH += '<div id="khist_'+uid+'_'+k.id+'" style="display:'+(openByDefault?'':'none')+'" class="kloglist">';
    entries.forEach(function(e,ei){
      var es=getSem(k.m,e.val,k.t);
      var esc2={green:'#16A34A',yellow:'#D97706',red:'#EF4444',none:'#CBD5E1'}[es];
      rightH += '<div class="kloge">'+
        '<div class="kloge-top">'+
        '<div class="ksd" style="background:'+esc2+'"></div>'+
        '<div class="kloge-val">'+fmtA(e.val,k.fmt)+' '+esc(k.u)+'</div>'+
        '<div class="kloge-dt">'+fmtDt(e.ts)+'</div>'+
        (curUser.isDir?'<button class="delbtn" style="margin-left:auto;padding:1px 6px;font-size:9px" data-action="dellog" data-uid="'+uid+'" data-kid="'+k.id+'" data-ei="'+ei+'" title="Eliminar este registro">x</button>':'')+
        '</div>'+
        (inEdit&&curUser.isDir?
          '<input class="einp" type="number" step="any" value="'+e.val+'" data-action="editlogval" data-uid="'+uid+'" data-kid="'+k.id+'" data-ei="'+ei+'" style="font-size:11px;font-weight:800;margin-bottom:3px">'+
          '<input class="einp" type="text" value="'+esc(e.nota||'')+'" placeholder="nota..." data-action="editlognota" data-uid="'+uid+'" data-kid="'+k.id+'" data-ei="'+ei+'" style="font-size:10px">':
          (e.nota?'<div class="kloge-nota">'+esc(e.nota)+'</div>':'')
        )+
        '<div class="kloge-who">por '+esc(e.user)+'</div></div>';
    });
    rightH += '</div>';
  }

  return '<div class="krow"><div class="krt">'+
    '<div class="knum" style="background:'+secColor+'">'+numStr+'</div>'+
    '<div>'+nameH+descH+'<div class="kbgs">'+freqH+tipoH+'</div>'+metaH+'</div>'+
    '<div class="krc">'+rightH+'</div>'+
    '</div></div>';
}

// ============================================================
// WIRE EVENTS — single handler, no accumulation
// ============================================================
var _activeUid = null;
var _wired = false;

function wireEvents(uid){
  _activeUid = uid;
  if(_wired) return;  // only wire once ever
  _wired = true;

  var main = document.getElementById('main');

  // ── Clicks ───────────────────────────────────────────────────
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-action]');
    if(!el) return;
    // Only handle if inside #main
    if(!document.getElementById('main').contains(el)) return;

    var uid = _activeUid;
    var action = el.getAttribute('data-action');
    var si = parseInt(el.getAttribute('data-si'));
    var ki = parseInt(el.getAttribute('data-ki'));
    var ri = parseInt(el.getAttribute('data-ri'));
    var elUid = el.getAttribute('data-uid') || uid;

    if(action==='addr'){
      appData[uid].resp.push('Nueva responsabilidad');
      renderUserDash(uid);
    }
    else if(action==='delr'){
      appData[uid].resp.splice(ri,1);
      renderUserDash(uid);
    }
    else if(action==='addsec'){
      addSection(elUid);
    }
    else if(action==='addkpi'){
      addKpi(uid,si);
    }
    else if(action==='delkpi'){
      if(confirm('Eliminar este KPI?')){
        appData[uid].secs[si].kpis.splice(ki,1);
        renderUserDash(uid);
      }
    }
    else if(action==='kreg'){
      var kid=el.getAttribute('data-kid');
      var fmt=el.getAttribute('data-fmt');
      var dtype=el.getAttribute('data-type');
      showLogForm(uid,kid,fmt,dtype,el);
    }
    else if(action==='dellog'){
      var kid2=el.getAttribute('data-kid');
      var ei=parseInt(el.getAttribute('data-ei'));
      if(!confirm('Eliminar este registro?')) return;
      var log2=getLog(uid);
      if(log2[kid2]){ log2[kid2].splice(ei,1); saveLog(uid,log2); }
      renderUserDash(uid);
    }
  });

  // ── klogt toggle (class-based, no data-action) ────────────────
  document.addEventListener('click', function(e){
    var el = e.target.closest('.klogt');
    if(!el) return;
    if(!document.getElementById('main').contains(el)) return;
    var hid = el.getAttribute('data-histid');
    var hel = document.getElementById(hid);
    if(hel){
      var open = hel.style.display!=='none';
      hel.style.display = open?'none':'';
      el.innerHTML = (open?'&#9654;':'&#9660;') + el.innerHTML.slice(1);
    }
  });

  // ── Input/Change ─────────────────────────────────────────────
  document.addEventListener('input', function(e){
    var el = e.target.closest('[data-action]');
    if(!el) return;
    if(!document.getElementById('main').contains(el)) return;

    var uid = _activeUid;
    var action = el.getAttribute('data-action');
    var elUid = el.getAttribute('data-uid') || uid;
    var si = parseInt(el.getAttribute('data-si'));
    var ki = parseInt(el.getAttribute('data-ki'));
    var ri = parseInt(el.getAttribute('data-ri'));
    var ii = parseInt(el.getAttribute('data-ii'));
    var v = el.value;

    if(action==='editlogval'){
      var kid3=el.getAttribute('data-kid'); var ei3=parseInt(el.getAttribute('data-ei'));
      var log3=getLog(uid); if(log3[kid3]&&log3[kid3][ei3]) log3[kid3][ei3].val=parseFloat(v)||0; saveLog(uid,log3);
    }
    else if(action==='editlognota'){
      var kid4=el.getAttribute('data-kid'); var ei4=parseInt(el.getAttribute('data-ei'));
      var log4=getLog(uid); if(log4[kid4]&&log4[kid4][ei4]) log4[kid4][ei4].nota=v; saveLog(uid,log4);
    }
    else if(action==='setr')      appData[elUid].resp[ri]=v;
    else if(action==='setifd')    appData[elUid].ifaces[ii].d=v;
    else if(action==='setcad')    appData[elUid].cad[el.getAttribute('data-ck')]=v;
    else if(action==='setsect')   appData[elUid].secs[si].s=v;
    else if(action==='setsecdesc')appData[elUid].secs[si].desc=v;
    else if(action==='setkname')  appData[elUid].secs[si].kpis[ki].l=v;
    else if(action==='setkdesc')  appData[elUid].secs[si].kpis[ki].d=v;
    else if(action==='setkunit')  appData[elUid].secs[si].kpis[ki].u=v;
    else if(action==='setkmeta')  appData[elUid].secs[si].kpis[ki].m=v===''?null:parseFloat(v);
  });

  document.addEventListener('change', function(e){
    var el = e.target.closest('[data-action]');
    if(!el) return;
    if(!document.getElementById('main').contains(el)) return;
    var elUid = el.getAttribute('data-uid') || _activeUid;
    var si = parseInt(el.getAttribute('data-si'));
    var ki = parseInt(el.getAttribute('data-ki'));
    var action = el.getAttribute('data-action');
    if(action==='setkfreq') appData[elUid].secs[si].kpis[ki].f=el.value;
    else if(action==='setktype') appData[elUid].secs[si].kpis[ki].t=el.value;
  });
}

function addSection(uid){
  appData[uid].secs.push({
    id:'s'+Date.now(), s:'Nueva Seccion', c:'#94A3B8', desc:'Descripcion', alert:'',
    responsable:'Responsable', sub:'',
    kpis:[{id:'k'+Date.now(),n:1,l:'KPI 1',d:'Descripcion',m:100,t:'MAX',u:'%',f:'Mensual',fmt:'pct'}]
  });
  renderUserDash(uid);
}
function addKpi(uid,si){
  var sec = appData[uid].secs[si];
  sec.kpis.push({id:'k'+Date.now(),n:sec.kpis.length+1,l:'Nuevo KPI',d:'Descripcion del objetivo',m:100,t:'MAX',u:'%',f:'Mensual',fmt:'pct'});
  renderUserDash(uid);
}

function showLogForm(uid,kid,fmt,dtype,triggerEl){
  var formId = 'kform_'+uid+'_'+kid;
  var el = document.getElementById(formId);
  if(!el) return;
  var isUsd = (fmt==='usd');
  var who = curUser.isDir ? 'Director' : curUser.name;

  var html = '<div class="kform">'+
    '<div class="kform-lbl">Registrar avance</div>'+
    '<div class="frow"><div class="flbl">Fecha</div>'+
    '<input class="finp" type="date" id="lfd_'+kid+'" value="'+todayStr()+'"></div>'+
    '<div class="frow"><div class="flbl">Valor</div>'+
    '<input class="finp" type="number" step="any" id="lfv_'+kid+'" placeholder="ingresar..."></div>'+
    (isUsd?
      '<div class="frow"><div class="flbl">O en ARS</div>'+
      '<input class="finp" type="number" step="any" id="lfa_'+kid+'" placeholder="importe en ARS...">'+
      '</div><div class="fconv" id="lfc_'+kid+'">TC: '+tc+' ARS/USD</div>':'')+
    '<div class="flbl" style="margin-top:4px">Nota o comentario</div>'+
    '<textarea class="fta" id="lfn_'+kid+'" rows="2" placeholder="Contexto, observacion, causa..."></textarea>'+
    '<div class="fbr">'+
    '<button class="fsave" id="lfsave_'+kid+'">Guardar</button>'+
    '<button class="fcanc" id="lfcanc_'+kid+'">Cancelar</button>'+
    '</div></div>';

  el.innerHTML = html;
  el.style.display = '';
  if(triggerEl) triggerEl.style.display='none';

  // ARS conversion
  var arsEl = document.getElementById('lfa_'+kid);
  if(arsEl){
    arsEl.addEventListener('input', function(){
      var ars=parseFloat(this.value)||0;
      var usd=ars/tc;
      document.getElementById('lfv_'+kid).value = ars>0?usd.toFixed(2):'';
      document.getElementById('lfc_'+kid).textContent = ars>0?(ars.toLocaleString('es-AR')+' ARS / '+tc+' = USD '+usd.toFixed(2)):'TC: '+tc+' ARS/USD';
    });
  }

  document.getElementById('lfsave_'+kid).addEventListener('click', function(){
    var valEl=document.getElementById('lfv_'+kid);
    if(!valEl||valEl.value==='') return;
    var dateStr=document.getElementById('lfd_'+kid).value;
    var nota=(document.getElementById('lfn_'+kid).value||'').trim();
    var ts=dateStr+'T'+new Date().toTimeString().slice(0,5);
    var log=getLog(uid);
    if(!log[kid]) log[kid]=[];
    log[kid].unshift({ts:ts,val:parseFloat(valEl.value),nota:nota,user:who});
    saveLog(uid,log);
    renderUserDash(uid);
  });

  document.getElementById('lfcanc_'+kid).addEventListener('click', function(){
    el.style.display='none';
    if(triggerEl) triggerEl.style.display='';
  });
}

          '<td>'+(latest.ts?fmtDt(latest.ts):'--')+'</td>'+
          '<td>'+(dv||'--')+'</td>'+
          '<td class="'+scls+'">'+slbl+'</td>'+
          '<td class="nota">'+esc(latest.nota||'')+(entries.length>1?' (+'+String(entries.length-1)+' prev.)':'')+'</td></tr>';
      });
      html += '</table>';
    });
    html += '</div>';
  });
  html += '</body></html>';
  var w=window.open('','_blank');
  if(w){ w.document.write(html); w.document.close(); setTimeout(function(){ w.print(); },600); }
}
